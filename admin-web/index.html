<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Gesturo Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LOGIN -->
  <section id="screen-login" class="screen">
    <div class="login-card">
      <h1>Gesturo <span class="dim">Admin</span></h1>
      <p class="muted">Reçois un lien magique par email pour te connecter.</p>
      <form id="login-form">
        <input id="login-email" type="email" placeholder="ton@email.com" required autocomplete="email">
        <button type="submit" id="login-btn">Envoyer le lien</button>
      </form>
      <div id="login-msg" class="msg"></div>
    </div>
  </section>

  <!-- ADMIN MAIN -->
  <section id="screen-admin" class="screen hidden">
    <header class="topbar">
      <div class="brand">Gesturo <span class="dim">Admin</span></div>
      <div class="user">
        <span id="user-email"></span>
        <button id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="nav-arrows">
        <button id="nav-back" class="nav-btn" title="Précédent (Cmd+[)">←</button>
        <button id="nav-fwd"  class="nav-btn" title="Suivant (Cmd+])">→</button>
        <button id="nav-up"   class="nav-btn" title="Dossier parent (Cmd+↑)">↑</button>
      </div>
      <div class="roots">
        <button class="root-btn" data-root="Sessions/current/">Photos</button>
        <button class="root-btn" data-root="Animations/current/">Animations</button>
        <button id="archive-toggle" class="root-btn" title="Voir / quitter la zone archive du root actif">📦 Archives</button>
      </div>
      <button id="add-btn" class="add-btn">＋ Ajouter</button>
      <input id="add-input" type="file" multiple hidden>
      <span id="result-count" class="muted"></span>
    </div>

    <nav id="breadcrumb" class="breadcrumb"></nav>

    <div id="grid-wrap" class="grid-wrap">
      <div id="grid" class="grid"></div>
      <div id="grid-msg" class="msg"></div>
      <div id="drop-overlay" class="drop-overlay">
        <div class="drop-card">
          <div class="drop-icon">⬇</div>
          <div class="drop-text">Lâche pour uploader ici</div>
          <div class="drop-prefix" id="drop-prefix"></div>
        </div>
      </div>
    </div>

    <!-- Upload progress (sticky bottom, distinct from action bar) -->
    <div id="upload-bar" class="upload-bar hidden">
      <div class="upload-info">
        <span id="upload-status">Upload…</span>
        <span id="upload-count" class="muted"></span>
      </div>
      <div class="upload-progress"><div id="upload-progress-fill"></div></div>
    </div>

    <!-- Action bar (sticky bottom) — only visible when something is selected -->
    <div id="action-bar" class="action-bar hidden">
      <span id="selection-count"></span>
      <div class="action-bar-buttons">
        <button id="action-restore" class="btn-secondary">♻ Restaurer</button>
        <button id="action-archive" class="btn-secondary">📦 Archiver</button>
        <button id="action-delete" class="btn-danger">🗑 Supprimer</button>
        <button id="action-clear" class="btn-ghost">Annuler</button>
      </div>
    </div>
  </section>

  <!-- Context menu (clic droit) -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button class="ctx-item" data-act="open">👁 Ouvrir</button>
    <button class="ctx-item" data-act="restore">♻ Restaurer</button>
    <button class="ctx-item" data-act="archive">📦 Archiver</button>
    <button class="ctx-item ctx-danger" data-act="delete">🗑 Supprimer</button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close">×</button>
    <img id="lightbox-img" alt="">
  </div>

  <!-- Confirmation modale (utilisée pour delete) -->
  <div id="confirm-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="confirm-title">Confirmer</h2>
      <p id="confirm-text"></p>
      <div id="confirm-extra"></div>
      <div class="modal-buttons">
        <button id="confirm-cancel" class="btn-ghost">Annuler</button>
        <button id="confirm-ok" class="btn-danger">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
