<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Gesturo Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LOGIN -->
  <section id="screen-login" class="screen">
    <div class="login-card">
      <h1>Gesturo <span class="dim">Admin</span></h1>
      <p class="muted">Reçois un lien magique par email pour te connecter.</p>
      <form id="login-form">
        <input id="login-email" type="email" placeholder="ton@email.com" required autocomplete="email">
        <button type="submit" id="login-btn">Envoyer le lien</button>
      </form>
      <div id="login-msg" class="msg"></div>
    </div>
  </section>

  <!-- ADMIN MAIN -->
  <section id="screen-admin" class="screen hidden">
    <header class="topbar">
      <div class="brand">Gesturo <span class="dim">Admin</span></div>
      <div class="admin-nav">
        <button class="admin-nav-btn active" data-panel="files">📂 Fichiers</button>
        <button class="admin-nav-btn" data-panel="challenges">🏆 Challenges</button>
      </div>
      <div id="global-stats" class="global-stats muted" title="Cliquer pour rafraîchir">📊 Calcul…</div>
      <div class="user">
        <span id="user-email"></span>
        <button id="audit-btn" title="Historique des actions admin">📜 Historique</button>
        <button id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <!-- ═ FILES PANEL ═ -->
    <div id="panel-files" class="admin-panel">
    <div class="toolbar">
      <div class="nav-arrows">
        <button id="nav-back" class="nav-btn" title="Précédent (Cmd+[)">←</button>
        <button id="nav-fwd"  class="nav-btn" title="Suivant (Cmd+])">→</button>
        <button id="nav-up"   class="nav-btn" title="Dossier parent (Cmd+↑)">↑</button>
      </div>
      <div class="roots">
        <button class="root-btn" data-root="Sessions/current/">Photos</button>
        <button class="root-btn" data-root="Animations/current/">Animations</button>
        <button id="archive-toggle" class="root-btn" title="Voir / quitter la zone archive du root actif">📦 Archives</button>
      </div>
      <button id="mkdir-btn" class="btn-secondary" title="Nouveau dossier">📁＋</button>
      <button id="add-btn" class="add-btn">＋ Ajouter</button>
      <input id="add-input" type="file" multiple hidden>
      <input id="search-input" type="search" placeholder="🔍 Rechercher…" autocomplete="off">
      <div class="thumb-toggle" title="Taille des miniatures">
        <button data-size="S" class="thumb-btn">S</button>
        <button data-size="M" class="thumb-btn">M</button>
        <button data-size="L" class="thumb-btn">L</button>
      </div>
      <select id="sort-select" title="Trier">
        <option value="name-asc">Nom A→Z</option>
        <option value="name-desc">Nom Z→A</option>
        <option value="size-desc">Taille ↓</option>
        <option value="size-asc">Taille ↑</option>
      </select>
      <span id="result-count" class="muted"></span>
    </div>

    <nav id="breadcrumb" class="breadcrumb"></nav>

    <div id="grid-wrap" class="grid-wrap">
      <div id="grid" class="grid"></div>
      <div id="marquee" class="marquee hidden"></div>
      <div id="grid-msg" class="msg"></div>
      <div id="drop-overlay" class="drop-overlay">
        <div class="drop-card">
          <div class="drop-icon">⬇</div>
          <div class="drop-text">Lâche pour uploader ici</div>
          <div class="drop-prefix" id="drop-prefix"></div>
        </div>
      </div>
    </div>

    <!-- Upload progress (sticky bottom, distinct from action bar) -->
    <div id="upload-bar" class="upload-bar hidden">
      <div class="upload-info">
        <span id="upload-status">Upload…</span>
        <span id="upload-count" class="muted"></span>
      </div>
      <div class="upload-progress"><div id="upload-progress-fill"></div></div>
    </div>

    <!-- Action bar (sticky bottom) — only visible when something is selected -->
    <div id="action-bar" class="action-bar hidden">
      <span id="selection-count"></span>
      <div class="action-bar-buttons">
        <button id="action-restore" class="btn-secondary">♻ Restaurer</button>
        <button id="action-archive" class="btn-secondary">📦 Archiver</button>
        <button id="action-delete" class="btn-danger">🗑 Supprimer</button>
        <button id="action-clear" class="btn-ghost">Annuler</button>
      </div>
    </div>
    </div><!-- /panel-files -->

    <!-- ═ CHALLENGES PANEL ═ -->
    <div id="panel-challenges" class="admin-panel hidden">
      <div class="challenges-layout">
        <!-- Create form -->
        <div class="challenge-form-card">
          <h2>Nouveau challenge</h2>
          <div class="form-group">
            <label for="ch-title">Titre</label>
            <input id="ch-title" type="text" placeholder="Ex : Dessine un chat en 5 min" autocomplete="off">
          </div>
          <div class="form-group">
            <label>Image de référence</label>
            <div class="ref-picker">
              <div id="ch-ref-preview" class="ref-preview hidden">
                <img id="ch-ref-preview-img" alt="Ref preview">
                <button id="ch-ref-clear" class="ref-clear" title="Retirer">&times;</button>
              </div>
              <div class="ref-picker-actions">
                <button id="ch-ref-browse" type="button" class="btn-secondary">📂 Choisir depuis R2</button>
                <span class="ref-picker-or">ou</span>
                <input id="ch-ref-url" type="url" placeholder="Coller une URL…" autocomplete="off">
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="ch-deadline">Deadline</label>
            <input id="ch-deadline" type="datetime-local">
          </div>
          <button id="ch-create-btn" class="add-btn">Créer le challenge</button>
          <div id="ch-form-msg" class="msg"></div>
        </div>

        <!-- List -->
        <div class="challenge-list-card">
          <h2>Challenges existants</h2>
          <div id="ch-list" class="ch-list">Chargement…</div>
        </div>
      </div>
    </div><!-- /panel-challenges -->

  </section>

  <!-- R2 image picker modal (for challenge ref image) -->
  <div id="ref-picker-modal" class="modal-backdrop hidden">
    <div class="modal ref-picker-modal">
      <div class="ref-picker-header">
        <h2>Choisir une image de référence</h2>
        <button id="ref-picker-close" class="btn-ghost">Fermer</button>
      </div>
      <nav id="ref-picker-breadcrumb" class="breadcrumb"></nav>
      <div id="ref-picker-grid" class="grid ref-picker-grid"></div>
    </div>
  </div>

  <!-- Context menu sur l'espace vide (clic droit dans le vide) -->
  <div id="ctx-empty" class="ctx-menu hidden">
    <button class="ctx-item" data-act="mkdir">📁＋ Nouveau dossier</button>
  </div>

  <!-- Context menu (clic droit) -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button class="ctx-item" data-act="open">👁 Ouvrir</button>
    <button class="ctx-item" data-act="rename">✏️ Renommer</button>
    <button class="ctx-item" data-act="restore">♻ Restaurer</button>
    <button class="ctx-item" data-act="archive">📦 Archiver</button>
    <button class="ctx-item ctx-danger" data-act="delete">🗑 Supprimer</button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close">×</button>
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev">‹</button>
    <button id="lightbox-next" class="lightbox-nav lightbox-next">›</button>
    <img id="lightbox-img" alt="">
    <div id="lightbox-meta" class="lightbox-meta">
      <div class="lightbox-meta-name" id="lightbox-meta-name"></div>
      <div class="lightbox-meta-info" id="lightbox-meta-info"></div>
      <button id="lightbox-meta-copy" class="lightbox-meta-copy">📋 Copier la key</button>
    </div>
  </div>

  <!-- Modale Historique (audit log) -->
  <div id="audit-modal" class="modal-backdrop hidden">
    <div class="modal audit-modal">
      <div class="audit-header">
        <h2>📜 Historique admin</h2>
        <button id="audit-close" class="btn-ghost">Fermer</button>
      </div>
      <div id="audit-list" class="audit-list">Chargement…</div>
    </div>
  </div>

  <!-- Toasts container -->
  <div id="toasts" class="toasts"></div>

  <!-- Hover preview agrandi -->
  <div id="hover-preview" class="hover-preview hidden"><img id="hover-preview-img" alt=""></div>

  <!-- Prompt modale (mkdir / rename) -->
  <div id="prompt-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="prompt-title">Nouveau</h2>
      <p id="prompt-text"></p>
      <input id="prompt-input" type="text" autocomplete="off">
      <div class="modal-buttons">
        <button id="prompt-cancel" class="btn-ghost">Annuler</button>
        <button id="prompt-ok" class="btn-secondary">OK</button>
      </div>
    </div>
  </div>

  <!-- Confirmation modale (utilisée pour delete) -->
  <div id="confirm-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="confirm-title">Confirmer</h2>
      <p id="confirm-text"></p>
      <div id="confirm-extra"></div>
      <div class="modal-buttons">
        <button id="confirm-cancel" class="btn-ghost">Annuler</button>
        <button id="confirm-ok" class="btn-danger">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
