name: Build & Release DMG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build DMG (sans notarisation)
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm run build -- --publish never

      - name: Setup API Key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Notarize (submit)
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "--- soumission notarisation ---"
          xcrun notarytool submit dist/Gesturo-*.dmg \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --no-wait
          echo "--- soumission envoyée ---"

      - name: Wait and check notarization
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "Attente 10 minutes..."
          sleep 600
          echo "--- vérification du statut ---"
          xcrun notarytool history \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER"

      - name: Staple
        run: xcrun stapler staple dist/Gesturo-*.dmg

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Rename DMG to latest
        run: cp dist/Gesturo-${{ steps.version.outputs.VERSION }}-arm64.dmg dist/Gesturo-latest-arm64.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gesturo ${{ steps.version.outputs.VERSION }}
          prerelease: false
          files: |
            dist/Gesturo-${{ steps.version.outputs.VERSION }}-arm64.dmg
            dist/Gesturo-latest-arm64.dmg
          token: ${{ secrets.GH_TOKEN }}
          repository: Vesanerie/gesturo-releases