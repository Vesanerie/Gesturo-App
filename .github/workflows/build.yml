name: Build & Release DMG

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build DMG
        timeout-minutes: 30
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm run build -- --publish never

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename DMG to latest
        run: cp dist/Gesturo-${{ steps.version.outputs.VERSION }}-arm64.dmg dist/Gesturo-latest-arm64.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gesturo ${{ steps.version.outputs.VERSION }}
          prerelease: false
          files: |
            dist/Gesturo-${{ steps.version.outputs.VERSION }}-arm64.dmg
            dist/Gesturo-latest-arm64.dmg
          token: ${{ secrets.GH_TOKEN }}
          repository: Vesanerie/gesturo-releases