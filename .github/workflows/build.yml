name: Build & Release DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          EOF

      - name: Build DMG (sans notarisation)
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm run build -- --publish never

      - name: Setup API Key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Notarize (submit)
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "--- soumission notarisation ---"
          xcrun notarytool submit dist/Gesturo-*.dmg \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --no-wait
          echo "--- soumission envoyée ---"

      - name: Wait and check notarization
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "Attente 10 minutes..."
          sleep 600
          echo "--- vérification du statut ---"
          xcrun notarytool history \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER"

      - name: Staple
        run: xcrun stapler staple dist/Gesturo-*.dmg

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gesturo ${{ steps.version.outputs.VERSION }}
          prerelease: false
          files: |
            dist/Gesturo-${{ steps.version.outputs.VERSION }}-universal.dmg
          token: ${{ secrets.GH_TOKEN }}

      - name: Update download.html on website
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Vesanerie/gesturo-website.git site
          cd site
          sed -i '' "s|Gesturo-[0-9]*\.[0-9]*\.[0-9]*-\(arm64\|universal\)\.dmg|Gesturo-${VERSION}-universal.dmg|g" download.html
          git config user.email "bot@gesturo.fr"
          git config user.name "Gesturo Bot"
          git add download.html
          git commit -m "chore: update download link to v${VERSION}"
          git push