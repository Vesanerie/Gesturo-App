name: Build & Release DMG

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          SUPABASE_URL=https://okhmokriethdqhsiptvu.supabase.co
          SUPABASE_PUBLISHABLE_KEY=sb_publishable_fzN6wsi999QFHNvg6i9m8A_wMIfp2ys
          R2_ACCESS_KEY_ID=fe8488de9b90b28eccfccbcf12399143
          R2_SECRET_ACCESS_KEY=c63403c1735e0d1fb1862e7096db25c1e37e631487721cbb05d341e5a9469667
          R2_BUCKET=gesturo-photos
          R2_ENDPOINT=https://d0379cc6397c14c330d638302ebdb9b1.r2.cloudflarestorage.com
          R2_PUBLIC_URL=https://pub-6f5ad41753f44365a1bf451423184422.r2.dev
          RESEND_API_KEY=re_eFVd5K5x_86V5UjPk3t6CCAjCx4aGuuH8
          ENVEOF

      - name: Build DMG
        run: npm run build

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gesturo ${{ steps.version.outputs.VERSION }}
          prerelease: true
          files: dist/*.dmg
          token: ${{ secrets.GH_TOKEN }}
          repository: Vesanerie/gesturo-releases
