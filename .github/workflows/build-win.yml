name: Build & Release Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          @"
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          "@ | Out-File -FilePath .env -Encoding utf8
        shell: pwsh

      - name: Build Windows installer
        run: npm run build:win -- --publish never

      - name: Get version
        id: version
        run: |
          $VERSION = node -e "console.log(require('./package.json').version)"
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create release if needed, then upload EXE
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Gesturo ${{ steps.version.outputs.VERSION }}" --draft=false
          gh release upload "$TAG" "dist/Gesturo Setup ${{ steps.version.outputs.VERSION }}.exe" --clobber
        shell: bash

      - name: Update download.html on website
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Vesanerie/gesturo-website.git site
          cd site
          sed -i "s|/download/v[0-9]*\.[0-9]*\.[0-9]*/Gesturo%20Setup%20[0-9]*\.[0-9]*\.[0-9]*\.exe|/download/v${VERSION}/Gesturo%20Setup%20${VERSION}.exe|g" download.html
          sed -i "s|/download/v[0-9]*\.[0-9]*\.[0-9]*/Gesturo.Setup.[0-9]*\.[0-9]*\.[0-9]*\.exe|/download/v${VERSION}/Gesturo%20Setup%20${VERSION}.exe|g" download.html
          git config user.email "bot@gesturo.fr"
          git config user.name "Gesturo Bot"
          git add download.html
          if git diff --cached --quiet; then
            echo "download.html already up to date — skipping"
            exit 0
          fi
          git commit -m "chore: update Windows download link to v${VERSION}"
          git push
        shell: bash
